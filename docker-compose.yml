version: '3.8'

services:
  backend:
    build: ./backend
    ports:
      - "8000:8000"
    environment:
      - TUSHARE_TOKEN=${TUSHARE_TOKEN}
      - DATABASE_URL=postgresql://valuegraph:valuegraph123@postgres:5432/valuegraph
      - REDIS_URL=redis://redis:6379/0
    depends_on:
      - postgres
      - redis
    volumes:
      - ./backend/app:/app/app
  
  postgres:
    image: postgres:15
    environment:
      POSTGRES_DB: valuegraph
      POSTGRES_USER: valuegraph
      POSTGRES_PASSWORD: valuegraph123
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
  
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

volumes:
  postgres_data:
